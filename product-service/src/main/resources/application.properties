# ============================================================
# TechStore API - Configuración local y AWS
# ============================================================
# Local por defecto: PostgreSQL Docker en localhost:5432
# AWS: reemplazar por variables de entorno en ECS Fargate

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/techstore}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}
spring.jpa.defer-datasource-initialization=true

# Health check para ALB / ECS
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# AWS / SQS
aws.region=${AWS_REGION:us-east-1}
techstore.audit.enabled=${TECHSTORE_AUDIT_ENABLED:false}
techstore.audit.queue-url=${TECHSTORE_AUDIT_QUEUE_URL:}

# JWT
techstore.jwt.secret=${TECHSTORE_JWT_SECRET:miclavesupersecretamiclavesupersecretam}
