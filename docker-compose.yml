version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: techstore_db
    environment:
      POSTGRES_DB: techstore
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    networks:
      - techstore-net

  backend:
    build: .
    container_name: techstore_api
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - techstore-net

  # NUEVO: AGREGAS ESTO
  nginx:
    image: nginx:alpine
    container_name: techstore_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - techstore-net

networks:
  techstore-net:
    driver: bridge