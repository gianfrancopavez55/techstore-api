name: Deploy TechStore API to AWS ECS Fargate

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  ECR_REPOSITORY: techstore-api
  ECS_CLUSTER: techstore-cluster
  ECS_SERVICE: techstore-api-service
  CONTAINER_NAME: techstore-api

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and test with Maven
        run: mvn -f product-service/pom.xml clean test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./product-service
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Create ECS task definition from template
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          TECHSTORE_AUDIT_QUEUE_URL: ${{ secrets.TECHSTORE_AUDIT_QUEUE_URL }}
          TECHSTORE_JWT_SECRET: ${{ secrets.TECHSTORE_JWT_SECRET }}
        run: |
          jq \
            --arg account "$AWS_ACCOUNT_ID" \
            --arg region "$AWS_REGION" \
            --arg image "$IMAGE_URI" \
            --arg dburl "$SPRING_DATASOURCE_URL" \
            --arg dbuser "$SPRING_DATASOURCE_USERNAME" \
            --arg dbpass "$SPRING_DATASOURCE_PASSWORD" \
            --arg queue "$TECHSTORE_AUDIT_QUEUE_URL" \
            --arg jwt "$TECHSTORE_JWT_SECRET" \
            '.executionRoleArn = ("arn:aws:iam::" + $account + ":role/LabRole")
             | .taskRoleArn = ("arn:aws:iam::" + $account + ":role/LabRole")
             | (.containerDefinitions[] | select(.name == "techstore-api") | .image) = $image
             | (.containerDefinitions[] | select(.name == "techstore-api") | .environment) = [
                {"name":"SPRING_DATASOURCE_URL", "value":$dburl},
                {"name":"SPRING_DATASOURCE_USERNAME", "value":$dbuser},
                {"name":"SPRING_DATASOURCE_PASSWORD", "value":$dbpass},
                {"name":"SPRING_JPA_DDL_AUTO", "value":"update"},
                {"name":"SPRING_SQL_INIT_MODE", "value":"never"},
                {"name":"AWS_REGION", "value":$region},
                {"name":"TECHSTORE_AUDIT_ENABLED", "value":"true"},
                {"name":"TECHSTORE_AUDIT_QUEUE_URL", "value":$queue},
                {"name":"TECHSTORE_JWT_SECRET", "value":$jwt}
             ]
             | (.containerDefinitions[] | select(.name == "techstore-api") | .logConfiguration.options."awslogs-region") = $region' \
            aws/ecs-task-definition-template.json > task-definition.json

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: task-definition.json
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
